<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Recovery Mode Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root{--bg:#0d0d0d;--bg2:rgba(255,255,255,0.03);--bg3:rgba(255,255,255,0.06);--bg4:rgba(255,255,255,0.09);--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);--text:#f0f0f0;--text2:rgba(255,255,255,0.35);--text3:rgba(255,255,255,0.2);--green:#4ade80;--yellow:#fbbf24;--red:#f87171;--radius:14px;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;}
  #app{max-width:480px;margin:0 auto;padding-bottom:100px;}
  /* SPLASH */
  #splash{position:fixed;inset:0;z-index:100;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;transition:opacity 0.5s ease;}
  #splash.hide{opacity:0;pointer-events:none;}
  .splash-logo{font-size:40px;margin-bottom:32px;}
  .splash-greeting{font-size:11px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;}
  .splash-name{font-size:30px;font-weight:700;color:var(--text);margin-bottom:10px;letter-spacing:-0.5px;}
  .splash-quote{font-size:13px;color:var(--text2);text-align:center;line-height:1.8;max-width:280px;margin-bottom:48px;}
  .splash-btn{background:var(--text);border:none;color:#0d0d0d;padding:14px 44px;font-size:13px;font-weight:600;letter-spacing:1px;border-radius:50px;cursor:pointer;font-family:inherit;}
  .splash-sub{font-size:11px;color:var(--text3);margin-top:14px;letter-spacing:1px;}
  /* HEADER */
  #header{padding:20px 20px 14px;border-bottom:1px solid var(--glass-border);position:sticky;top:0;background:rgba(13,13,13,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:9;}
  #header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
  .header-user{font-size:11px;color:var(--text3);letter-spacing:1px;text-align:right;}
  #jump-today-btn{display:none;background:none;border:1px solid var(--glass-border);color:var(--text2);padding:4px 12px;font-size:10px;letter-spacing:1px;border-radius:20px;cursor:pointer;font-family:inherit;}
  .lbl{font-size:10px;color:var(--text3);letter-spacing:3px;margin-bottom:4px;text-transform:uppercase;}
  #date-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
  #progress-bar-wrap{height:2px;background:var(--glass-border);border-radius:2px;margin-top:14px;overflow:hidden;}
  #progress-bar{height:100%;width:0%;border-radius:2px;transition:width 0.5s ease;}
  #progress-meta{display:flex;justify-content:space-between;margin-top:7px;font-size:10px;color:var(--text3);}
  /* NAV */
  #nav{display:flex;border-bottom:1px solid var(--glass-border);overflow-x:auto;background:rgba(13,13,13,0.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);scrollbar-width:none;}
  #nav::-webkit-scrollbar{display:none;}
  .nav-btn{flex:1;min-width:48px;padding:13px 2px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-size:9px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;font-family:inherit;white-space:nowrap;}
  .nav-btn.active{border-bottom:2px solid var(--text);color:var(--text);}
  /* BODY */
  .body{padding:16px;}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  /* TASK ROWS */
  .task-row{display:flex;align-items:center;padding:14px 0;gap:14px;border-bottom:1px solid var(--glass-border);animation:fadeRow 0.2s ease;}
  @keyframes fadeRow{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .check-circle{width:24px;height:24px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1.5px solid var(--glass-border);background:none;display:flex;align-items:center;justify-content:center;font-size:11px;color:#0d0d0d;transition:all 0.2s ease;}
  
.check-circle.done{
  border-color:transparent;
  background:var(--text);
  animation:taskPulse 0.22s ease;
}

@keyframes taskPulse{
  0%{transform:scale(0.88);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

  .task-info{flex:1;min-width:0;}
  .task-name{font-size:14px;color:var(--text);word-break:break-word;}
  .task-name.done{color:var(--text3);text-decoration:line-through;}
  .task-time{font-size:11px;color:var(--text3);margin-top:3px;}
  .task-actions{display:flex;gap:6px;flex-shrink:0;}
  .edit-row{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}
  .edit-bottom{display:flex;gap:6px;align-items:center;}
  /* BUTTONS */
  .btn-edit{background:none;border:1px solid var(--glass-border);color:var(--text2);padding:4px 10px;font-size:10px;border-radius:8px;cursor:pointer;font-family:inherit;}
  .btn-edit.active{background:var(--text);color:#0d0d0d;border-color:transparent;}
  .btn-del{background:none;border:1px solid rgba(248,113,113,0.3);color:#f87171;padding:4px 9px;font-size:11px;border-radius:8px;cursor:pointer;font-family:inherit;}
  .btn-move{background:none;border:1px solid var(--glass-border);color:var(--text2);padding:4px 8px;font-size:12px;border-radius:8px;cursor:pointer;font-family:inherit;}
  .btn-ok{background:var(--text);border:none;color:#0d0d0d;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;flex-shrink:0;font-weight:600;}
  .btn-add{width:100%;background:var(--text);border:none;color:#0d0d0d;padding:12px;font-size:12px;letter-spacing:2px;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600;}
  /* INPUTS */
  .card{margin-top:16px;padding:16px;background:var(--glass);border-radius:var(--radius);border:1px solid var(--glass-border);}
  .inp{width:100%;background:var(--bg2);border:1px solid var(--glass-border);color:var(--text);padding:10px 13px;font-size:13px;border-radius:10px;font-family:inherit;margin-bottom:8px;display:block;}
  .inp:focus{outline:none;border-color:rgba(255,255,255,0.3);}
  .inp-time{width:90px;flex-shrink:0;margin-bottom:0;}
  /* WEEK */
  .week-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--glass-border);}
  .week-day{width:38px;text-align:center;}
  .week-day-name{font-size:10px;color:var(--text3);}
  .week-day-num{font-size:18px;color:var(--text3);font-weight:300;}
  .week-day-num.today{font-weight:700;color:var(--text);}
  .bar-wrap{flex:1;height:3px;background:var(--glass-border);border-radius:3px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease;}
  .score-text{font-size:12px;width:34px;text-align:right;font-weight:500;}
  /* MONTH */
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .month-day-header{font-size:9px;color:var(--text3);text-align:center;margin-bottom:6px;}
  .month-cell{aspect-ratio:1;border-radius:7px;background:var(--bg2);border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .month-cell.today{border-color:var(--text2);}
  .month-cell.future{opacity:0.2;}
  .month-cell-num{font-size:10px;color:var(--text3);}
  .month-cell-num.today{color:var(--text);}
  .month-cell-pct{font-size:8px;}
  /* YEAR */
  .year-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--glass-border);}
  .year-month{width:28px;font-size:11px;color:var(--text3);}
  /* STAT */
  .stat-card{margin-top:14px;padding:18px;background:var(--glass);border-radius:var(--radius);border:1px solid var(--glass-border);}
  .stat-avg{font-size:34px;font-weight:700;margin-top:6px;}
  .stat-sub{font-size:11px;color:var(--text2);margin-top:5px;}
  /* REPORTS */
  .report-tabs{display:flex;gap:5px;margin-bottom:16px;}
  .rtab{flex:1;padding:8px 2px;background:var(--glass);border:1px solid var(--glass-border);color:var(--text3);font-size:9px;letter-spacing:1px;border-radius:10px;cursor:pointer;font-family:inherit;text-transform:uppercase;}
  .rtab.active{background:var(--bg4);border-color:var(--text2);color:var(--text);}
  .chart-wrap{background:var(--glass);border-radius:var(--radius);border:1px solid var(--glass-border);padding:16px;margin-bottom:12px;}
  .chart-title{font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:12px;text-transform:uppercase;}
  canvas{width:100% !important;}
  .export-btn{width:100%;background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:12px;font-size:11px;letter-spacing:1px;border-radius:10px;cursor:pointer;font-family:inherit;text-transform:uppercase;margin-top:8px;}
  .export-btn:active{background:var(--bg3);}
  /* STREAK */
  .hidden{display:none;}
  .streak-wrap{display:flex;gap:10px;margin-bottom:18px;}
  .streak-box{flex:1;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:16px 12px;text-align:center;}
  .streak-num{font-size:30px;font-weight:700;}
  .streak-lbl{font-size:9px;color:var(--text3);letter-spacing:2px;margin-top:4px;text-transform:uppercase;line-height:1.4;}
  .streak-fire{font-size:20px;margin-bottom:4px;}
  .cal-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
  .cal-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
  .nav-arrow{background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);padding:6px 14px;font-size:14px;border-radius:10px;cursor:pointer;font-family:inherit;}
  ::-webkit-scrollbar{width:0;}
</style>
</head>
<body>
<div id="app">
  <div id="splash">
    <div class="splash-logo">&#127919;</div>
    <div class="splash-greeting" id="splash-greeting"></div>
    <div class="splash-name" id="splash-name"></div>
    <div class="splash-quote" id="splash-quote"></div>
    <button class="splash-btn" id="splash-btn">Start</button>
    <div class="splash-sub" id="splash-sub">tap to continue</div>
  </div>
  <div id="header">
    <div id="header-top">
      <div><div class="lbl">Recovery Mode</div><div id="date-title"></div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;padding-top:2px">
        <div class="header-user" id="header-username"></div>
        <button id="jump-today-btn">Today</button>
      </div>
    </div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="progress-meta"><span id="done-count">0/0 done</span><span id="score-pct">0%</span></div>
  </div>
  <div id="nav">
    <button class="nav-btn active" data-view="today">Today</button>
    <button class="nav-btn" data-view="week">Week</button>
    <button class="nav-btn" data-view="month">Month</button>
    <button class="nav-btn" data-view="year">Year</button>
    <button class="nav-btn" data-view="streak">Streak</button>
    <button class="nav-btn" data-view="macros">Macros</button>
    <button class="nav-btn" data-view="reports">Reports</button>
  </div>
  <div id="view-today" class="body"></div>
  <div id="view-week" class="body hidden"></div>
  <div id="view-month" class="body hidden"></div>
  <div id="view-year" class="body hidden"></div>
  <div id="view-streak" class="body hidden"></div>
  <div id="view-macros" class="body hidden"></div>
  <div id="view-reports" class="body hidden"></div>
  <div id="import-toast" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1c1c1c;border:1px solid #2a2a2a;color:#e8e8e8;padding:12px 20px;border-radius:8px;font-size:12px;font-family:monospace;z-index:999;max-width:320px;text-align:center;line-height:1.5"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const INIT_TASKS = [];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function toKey(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+day; }
function getTodayKey(){ return toKey(new Date()); }
function getToday(){ return new Date(); }

const QUOTES=["The secret of getting ahead is getting started.","Small daily improvements lead to stunning results.","Discipline is choosing between what you want now and what you want most.","You don't have to be great to start, but you have to start to be great.","Every day is a chance to be better than yesterday.","Progress, not perfection.","Show up. Do the work. Trust the process.","Your future self is watching. Make them proud.","One day or day one. You decide.","Consistency beats intensity every time.","Build the life you want, one habit at a time."];
function getGreeting(){var h=new Date().getHours();if(h<12)return"Good morning";if(h<17)return"Good afternoon";if(h<21)return"Good evening";return"Good night";}

function ld(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let tasks=ld("rm_tasks",INIT_TASKS);
let logs=ld("rm_logs",{});
let userName=ld("rm_username","");
let macros=ld("rm_macros",[]);
let editMode = false;
let editId = null;
let viewingKey = null; 
let weekOffset = 0;   
let monthOffset = 0;  
let yearOffset = 0;   
let currentView = "today";
let reportPeriod="week";
let reportOffset=0;
let chartInstances={};
let macroEditMode=false;
let macroEditId=null;
let macroViewKey=null;
let tasksSubPeriod = "all"; 
let tasksOffset = 0; 

function clr(s){ return s>=80?"#4ade80":s>=50?"#facc15":s>0?"#f87171":"#2a2a2a"; }
function scoreOf(log, dayKey){
  if(!log) return 0;
  const key = dayKey || getTodayKey();
  const hidden = log.__hiddenIds || [];
  const baseIds = log.__taskIds ? log.__taskIds : tasks.map(t=>t.id);
  const ids = baseIds.filter(id=>{
    if(hidden.includes(id)) return false;
    const t=tasks.find(t=>t.id===id);
    if(!t) return false; 
    if(t.deletedAt && t.deletedAt<=key) return false; 
    return true;
  });
  if(!ids.length) return 0;
  const done = ids.filter(id=>log[id]).length;
  return Math.round((done/ids.length)*100);
}
function visibleTasksForDay(log, dayKey){
  const hidden = (log&&log.__hiddenIds)||[];
  const key = dayKey || getTodayKey();
  if(log&&log.__taskIds){
    const ids = log.__taskIds.filter(id=>!hidden.includes(id));
    return ids.map(id=>tasks.find(t=>t.id===id&&(!t.deletedAt||t.deletedAt>key))).filter(Boolean);
  } else {
    return tasks.filter(t=>!hidden.includes(t.id)&&(!t.createdAt||t.createdAt<=key)&&(!t.deletedAt||t.deletedAt>key));
  }
}
function persist(){sv("rm_tasks",tasks);sv("rm_logs",logs);sv("rm_username",userName);sv("rm_macros",macros);}


function updateHeader(){
  const uEl=document.getElementById("header-username");if(uEl)uEl.textContent=userName||"";
  const jBtn=document.getElementById("jump-today-btn");if(jBtn)jBtn.style.display=(viewingKey&&viewingKey!==getTodayKey())?"block":"none";
  const activeKey = viewingKey || getTodayKey();
  const [ayr,amo,ady]=activeKey.split("-").map(Number);
  const activeDate=new Date(ayr,amo-1,ady);
  document.getElementById("date-title").textContent = activeDate.toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"short"});
  const log=logs[activeKey]||{};
  const score=scoreOf(log,activeKey);
  const vt=visibleTasksForDay(log,activeKey);
  const done=vt.filter(t=>log[t.id]).length;
  document.getElementById("progress-bar").style.width=score+"%";
  document.getElementById("progress-bar").style.background=clr(score);
  document.getElementById("done-count").textContent=done+"/"+vt.length+" done";
  document.getElementById("score-pct").textContent=score+"%";
  document.getElementById("score-pct").style.color=clr(score);
}

function renderToday(){
  const el=document.getElementById("view-today");
  const activeKey = viewingKey || getTodayKey();
  const isLiveToday = activeKey === getTodayKey();
  {
    const _existing = logs[activeKey] || {};
    if(!_existing.__taskIds){
      const _snap = tasks.filter(t => !t.createdAt || t.createdAt <= activeKey).map(t=>t.id);
      logs[activeKey] = Object.assign({}, _existing, {__taskIds: _snap});
      persist();
    }
  }
  const log=logs[activeKey]||{};
  const [ayr,amo,ady]=activeKey.split('-').map(Number);
  const activeDate=new Date(ayr,amo-1,ady);
  const prevKey=(()=>{ const d=new Date(ayr,amo-1,ady); d.setDate(d.getDate()-1); return toKey(d); })();
  const nextKey=(()=>{ const d=new Date(ayr,amo-1,ady); d.setDate(d.getDate()+1); return toKey(d); })();
  const canGoNext = nextKey <= getTodayKey();
  let html=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:#111;border-radius:8px;padding:10px 14px;border:1px solid #1c1c1c">
    <button id="day-prev" style="background:none;border:1px solid #2a2a2a;color:#555;padding:4px 12px;font-size:14px;border-radius:4px;cursor:pointer">‹</button>
    <div style="text-align:center">
      <div style="font-size:12px;font-weight:700;color:${isLiveToday?'#4ade80':'#e8e8e8'}">${isLiveToday?"TODAY":activeDate.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}</div>
      ${!isLiveToday?'<div style="font-size:9px;color:#555;letter-spacing:2px;margin-top:2px">EDITING PAST</div>':''}
    </div>
    <button id="day-next" style="background:none;border:1px solid #2a2a2a;color:${canGoNext?'#555':'#2a2a2a'};padding:4px 12px;font-size:14px;border-radius:4px;cursor:pointer;pointer-events:${canGoNext?'auto':'none'}">›</button>
  </div>
  <div class="section-header">
    <div class="lbl">${isLiveToday?"Today's Tasks":"Tasks — "+activeKey}</div>
    <div style="display:flex;gap:6px">
      <button class="btn-edit ${editMode?'active':''}" id="edit-toggle">${editMode?"DONE":"EDIT"}</button>
    </div>
  </div>
  `;

  const visibleTasks = visibleTasksForDay(log, activeKey);
  visibleTasks.forEach(task=>{
    const done=!!log[task.id];
    if(editMode && editId===task.id){
      const sn = task.name.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      const st = (task.time||'').replace(/"/g,'&quot;');
      html+=`<div class="task-row">
        <div class="edit-row">
          <input class="inp" id="edit-name-inp" value="${sn}" placeholder="Task name" style="margin-bottom:0;">
          <div class="edit-bottom">
            <input class="inp inp-time" id="edit-time-inp" value="${st}" placeholder="Time">
            <button class="btn-ok" id="save-edit-btn">OK</button>
          </div>
        </div>
      </div>`;
    } else {
      html+=`<div class="task-row">`;
      if(!editMode){
        html+=`<div class="check-circle ${done?'done':''}" data-toggle="${task.id}">${done?"✓":""}</div>`;
      }
      html+=`<div class="task-info">
        <div class="task-name ${done&&!editMode?'done':''}">${task.name}</div>
        ${task.time&&!editMode?'<div class="task-time">'+task.time+'</div>':''}
      </div>`;
      if(editMode){
        const idx=visibleTasks.indexOf(task);
        html+=`<div class="task-actions">
          <button class="btn-move" data-up="${task.id}" ${idx===0?'style="opacity:0.2;pointer-events:none"':''}>↑</button>
          <button class="btn-move" data-dn="${task.id}" ${idx===visibleTasks.length-1?'style="opacity:0.2;pointer-events:none"':''}>↓</button>
          <button class="btn-edit" data-edit="${task.id}">edit</button>
          <button class="btn-del" data-del="${task.id}" title="${isLiveToday?'Remove globally':'Hide for this day'}">${isLiveToday?"✕":"–"}</button>
        </div>`;
      }
      html+=`</div>`;
    }
  });

  if(editMode){
    html+=`<div class="card">
      <div class="lbl" style="margin-bottom:12px">Add Task</div>
      <input class="inp" id="new-name" placeholder="Task name">
      <input class="inp" id="new-time" placeholder="Time (e.g. 6:00)">
      <button class="btn-add" id="add-task-btn">ADD TASK</button>
    </div>`;
  }

  el.innerHTML=html;

}


function renderWeek(){
  const el=document.getElementById("view-week");
  const base=new Date(getToday());
  base.setDate(base.getDate()+weekOffset*7);
  const weekDates=Array.from({length:7},(_,i)=>{ const d=new Date(base); d.setDate(base.getDate()-base.getDay()+i); return d; });
  const weekStart=weekDates[0], weekEnd=weekDates[6];
  const label=weekStart.toLocaleDateString("en-IN",{day:"numeric",month:"short"})+" – "+weekEnd.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});
  let total=0,cnt=0;
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <button id="week-prev" style="background:none;border:1px solid #2a2a2a;color:#555;padding:5px 13px;font-size:13px;border-radius:4px;cursor:pointer">‹</button>
    <div style="text-align:center">

function getDayData(){
  const log=logs[getTodayKey()]||{};
  const vt=visibleTasksForDay(log, getTodayKey());
  return {
    labels: vt.map(t=>t.name.length>12?t.name.slice(0,12)+"…":t.name),
    scores: vt.map(t=>log[t.id]?100:0),
    title: "Today"
  };
}

function getWeekData(){const base=new Date(getToday());base.setDate(base.getDate()+reportOffset*7);const todayK=getTodayKey();const dates=Array.from({length:7},(_,i)=>{const d=new Date(base);d.setDate(base.getDate()-base.getDay()+i);return d;});const label=toKey(dates[0])+" to "+toKey(dates[6]);return{labels:dates.map(d=>DAYS[d.getDay()]),scores:dates.map(d=>{const k=toKey(d);return k>todayK?null:scoreOf(logs[k],k);}),title:reportOffset===0?"This Week":label,canNext:reportOffset<0};}

function getMonthData(){const base=new Date(getToday().getFullYear(),getToday().getMonth()+reportOffset,1);const yr=base.getFullYear(),mo=base.getMonth(),todayK=getTodayKey();const daysInMonth=new Date(yr,mo+1,0).getDate();const dates=Array.from({length:daysInMonth},(_,i)=>new Date(yr,mo,i+1));return{labels:dates.map(d=>d.getDate()+""),scores:dates.map(d=>{const k=toKey(d);return k>todayK?null:scoreOf(logs[k],k);}),title:MONTHS[mo]+" "+yr,canNext:reportOffset<0};}

function getYearData(){const yr=getToday().getFullYear()+reportOffset,todayK=getTodayKey();return{labels:MONTHS,scores:MONTHS.map((_,mi)=>{const mDays=new Date(yr,mi+1,0).getDate();const mDates=Array.from({length:mDays},(_,i)=>new Date(yr,mi,i+1));const past=mDates.filter(d=>toKey(d)<=todayK);if(!past.length)return toKey(new Date(yr,mi,1))>todayK?null:0;return Math.round(past.reduce((a,d)=>a+scoreOf(logs[toKey(d)],toKey(d)),0)/past.length);}),title:yr+"",canNext:reportOffset<0};}

function getReportData(){
  if(reportPeriod==="day") return getDayData();
  if(reportPeriod==="week") return getWeekData();
  if(reportPeriod==="month") return getMonthData();
  return getYearData();
}

function getPieData(){
  const data=getReportData();
  const valid=data.scores.filter(s=>s!==null);
  return {
    strong: valid.filter(s=>s>=80).length,
    partial: valid.filter(s=>s>=50&&s<80).length,
    weak: valid.filter(s=>s>0&&s<50).length,
    zero: valid.filter(s=>s===0).length
  };
}

function destroyChart(id){ if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; } }

function reportTitle(){const d=getReportData();return(d&&d.title)||getToday().getFullYear()+"";}


function getTasksWindowKeys(){
  const todayK = getTodayKey();
  if(tasksSubPeriod==="month"){
    const base=new Date(getToday().getFullYear(), getToday().getMonth()+tasksOffset, 1);
    const yr=base.getFullYear(), mo=base.getMonth();
    const days=new Date(yr,mo+1,0).getDate();
    const keys=[];
    for(let i=1;i<=days;i++){
      const k=toKey(new Date(yr,mo,i));
      if(k<=todayK) keys.push(k);
    }
    return {keys, label:MONTHS[mo]+" "+yr, canNext:tasksOffset<0};
  } else if(tasksSubPeriod==="year"){
    const yr=getToday().getFullYear()+tasksOffset;
    const keys=Object.keys(logs).filter(k=>k.startsWith(yr+"")&&k<=todayK).sort();
    return {keys, label:yr+"", canNext:tasksOffset<0};
  } else {
    const keys=Object.keys(logs).filter(k=>k<=todayK).sort();
    return {keys, label:"All Time", canNext:false};
  }
}

function getTasksPerformanceData(){
  const {keys} = getTasksWindowKeys();
  return tasks.map(t=>{
    let active=0, done=0;
    keys.forEach(k=>{
      const log=logs[k];
      if(!log||!log.__taskIds) return;
      const hidden=(log.__hiddenIds)||[];
      if(!log.__taskIds.includes(t.id)||hidden.includes(t.id)) return;
      if(t.deletedAt&&k>=t.deletedAt) return;
      active++;
      if(log[t.id]) done++;
    });
    const rate=active>0?Math.round((done/active)*100):0;
    const deleted=!!(t.deletedAt&&t.deletedAt<=getTodayKey());
    return {name:(deleted?"● ":"◉ ")+t.name, done, active, rate, deleted};
  }).filter(t=>t.active>0); 
}

// Returns macro completion % for a single day key
function macroScoreOf(dayKey){
  if(!macros.length) return 0;
  const dl=logs[dayKey]||{};
  const md=dl.__macros||{};
  const done=macros.filter(m=>md[m.id]).length;
  return Math.round((done/macros.length)*100);
}

function calcStreak(){
  let cur=0, best=0, tmp=0;
  const d=new Date(getToday());
  for(let i=0;i<365;i++){
    const k=toKey(d);
    if(scoreOf(logs[k],k)>0){ cur++; d.setDate(d.getDate()-1); }
    else break;
  }
  const allKeys=Object.keys(logs).sort();
  tmp=0;
  allKeys.forEach(k=>{ if(scoreOf(logs[k],k)>0){tmp++;best=Math.max(best,tmp);}else{tmp=0;} });
  return {cur, best};
}

function exportReportImage(){
  const reportEl = document.getElementById("view-reports");
  if(typeof html2canvas !== "undefined"){
    html2canvas(reportEl, {
      backgroundColor: "#0a0a0a",
      scale: 3,
      useCORS: true,
      logging: false,
    }).then(canvas => {
      const a = document.createElement("a");
      a.download = "tracker-report-"+reportPeriod+".png";
      a.href = canvas.toDataURL("image/png");
      a.click();
    });
  } else {
    const bc = document.getElementById("bar-chart");
    const pc = document.getElementById("pie-chart");
    const scale = 3;
    const w = 420*scale, padding = 20*scale;
    const bh = bc ? bc.height*scale : 0;
    const ph = pc ? pc.height*scale : 0;
    const headerH = 80*scale;
    const summaryH = 160*scale;
    const totalH = headerH + bh + 20*scale + ph + 20*scale + summaryH;
    const out = document.createElement("canvas");
    out.width = w; out.height = totalH;
    const ctx = out.getContext("2d");
    const bg = "#0a0a0a";
    const fg = "#e8e8e8";
    const muted = "#555555";
    ctx.fillStyle = bg; ctx.fillRect(0,0,w,totalH);
    ctx.fillStyle = fg; ctx.font = `bold ${16*scale}px monospace`;
    ctx.fillText("RECOVERY MODE TRACKER", padding, 36*scale);
    ctx.font = `${10*scale}px monospace`; ctx.fillStyle = muted;
    ctx.fillText(reportTitle()+" · "+getToday().toLocaleDateString("en-IN"), padding, 54*scale);
    if(bc){ ctx.drawImage(bc, 0, 0, bc.width, bc.height, padding, headerH, w-padding*2, bh); }
    if(pc){ ctx.drawImage(pc, 0, 0, pc.width, pc.height, padding, headerH+bh+20*scale, w-padding*2, ph); }
    
    const sy = headerH+bh+ph+50*scale;
    const _fd=getReportData();
    const pieData = getPieData();
    const valid = _fd.scores.filter(s=>s!==null);
    const avg = valid.length?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):0;
    ctx.fillStyle = fg; ctx.font = `${13*scale}px monospace`;
    ctx.fillText("Average: "+avg+"%", padding, sy);
    ctx.fillStyle="#4ade80"; ctx.font=`${11*scale}px monospace`;
    ctx.fillText("Strong: "+pieData.strong, padding, sy+20*scale);
    ctx.fillStyle="#facc15"; ctx.fillText("Partial: "+pieData.partial, padding, sy+36*scale);
    ctx.fillStyle="#f87171"; ctx.fillText("Weak: "+pieData.weak, padding, sy+52*scale);
    ctx.fillStyle=muted; ctx.fillText("Missed: "+pieData.zero, padding, sy+68*scale);
    const a = document.createElement("a");
    a.download="tracker-report.png"; a.href=out.toDataURL("image/png"); a.click();
  }
}

(function initTodaySnapshot(){
  const k = getTodayKey();
  const existing = logs[k] || {};
  if(!existing.__taskIds){
    const snap = tasks.filter(t=>(!t.createdAt||t.createdAt<=k)&&(!t.deletedAt||t.deletedAt>k)).map(t=>t.id);
    logs[k] = Object.assign({}, existing, {__taskIds: snap});
    sv("rm_logs", logs);
  }
})();

function exportAllToExcel(){
  if(typeof XLSX==="undefined"){ showImportStatus("SheetJS not loaded. Try again.","#f87171"); return; }
  const wb = XLSX.utils.book_new();
  const todayK = getTodayKey();
  const allKeys = Object.keys(logs).filter(k=>k<=todayK).sort();
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  // 1. DEDICATED MANUAL INPUT-EXPORT WORKLOG SHEET (The single target driving re-imports safely)
  const manualSheet = [
    ["[MANUAL EDITING WORKLOG - EDIT LOG STATUS BELOW AND RE-IMPORT SAFELY]"],
    ["--------------------------------------------------------------------------------------"],
    ["date", "task_id", "task_name", "status (Done / Undone)"],
    ["--------------------------------------------------------------------------------------"]
  ];
  allKeys.forEach(k => {
    const log = logs[k] || {};
    const vt = visibleTasksForDay(log, k);
    vt.forEach(t => {
      manualSheet.push([k, t.id, t.name, log[t.id] ? "Done" : "Undone"]);
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(manualSheet), "Manual Import-Export Tracker");

  // 2. STREAKS ANALYSIS SUMMARY SHEET
  const {cur, best} = calcStreak();
  const streakSheet = [
    ["[STREAK METRICS TRENDS]"],
    ["-----------------------------------------"],
    ["Metric Description", "Value Summary"],
    ["-----------------------------------------"],
    ["Current Active Continuous Streak", cur + " Days"],
    ["All-Time Highest Historical Streak Record", best + " Days"],
    ["-----------------------------------------"],
    [],
    ["[CHRONOLOGICAL TRAJECTORY LOG]"],
    ["date", "score_pct", "tasks_done", "total_tasks", "running_streak_position"]
  ];
  let streakNum = 0;
  allKeys.forEach(k => {
    const log = logs[k] || {};
    const sc = scoreOf(log, k);
    const vt = visibleTasksForDay(log, k);
    const done = vt.filter(t => log[t.id]).length;
    if (sc > 0) streakNum++; else streakNum = 0;
    streakSheet.push([k, sc + "%", done, vt.length, sc > 0 ? streakNum : 0]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(streakSheet), "Streaks Analytics");

  // 3. CORE GLOBAL MASTER TASKS REGISTRY SHEET
  const taskSheet = [
    ["[MASTER APPLICATION TASKS REGISTRY]"],
    ["-------------------------------------------------------------"],
    ["id", "name", "time_configuration", "createdAt", "deletedAt"],
    ["-------------------------------------------------------------"]
  ];
  tasks.forEach(t => { 
    taskSheet.push([t.id, t.name, t.time || "", t.createdAt || "", t.deletedAt || ""]); 
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(taskSheet), "Tasks Definition");

  // 4. REPORTS: CHRONOLOGICAL HISTORICAL ANALYSIS SUMMARY 
  const summarySheet = [
    ["[CHRONOLOGICAL TRACKING LOG ENTRIES]"],
    ["---------------------------------------------------------------------------------"],
    ["date", "day_of_week", "score_pct", "done_count", "total_count", "completed_tasks_list"],
    ["---------------------------------------------------------------------------------"]
  ];
  allKeys.forEach(k => {
    const log = logs[k] || {};
    const vt = visibleTasksForDay(log, k);
    const done = vt.filter(t => log[t.id]);
    const sc = scoreOf(log, k);
    const [y, m, d] = k.split("-").map(Number);
    summarySheet.push([
      k, 
      DAYS[new Date(y, m - 1, d).getDay()], 
      sc + "%", 
      done.length, 
      vt.length, 
      done.map(t => t.name).join(", ")
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summarySheet), "Daily Performance Summary");

  // 5. REPORTS: WEEKLY CONSOLIDATIONS PERIODIC VIEWS
  const weekSheet = [
    ["[WEEKLY HISTORICAL TRENDS]"],
    ["-----------------------------------------------------------------------------------------"],
    ["week_start", "week_end", "avg_score", "strong_days_count", "partial_days_count", "weak_days_count", "missed_days_count"],
    ["-----------------------------------------------------------------------------------------"]
  ];
  if (allKeys.length > 0) {
    let curW = new Date(allKeys[0]); 
    curW.setDate(curW.getDate() - curW.getDay());
    const lastW = new Date(todayK);
    while (curW <= lastW) {
      const wDates = Array.from({length: 7}, (_, i) => { const d = new Date(curW); d.setDate(curW.getDate() + i); return d; });
      const wKeys = wDates.map(d => toKey(d)).filter(k => k <= todayK && logs[k]);
      if (wKeys.length > 0) {
        const scores = wKeys.map(k => scoreOf(logs[k], k));
        const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
        weekSheet.push([
          toKey(wDates[0]), 
          toKey(wDates[6]), 
          avg + "%", 
          scores.filter(s => s >= 80).length, 
          scores.filter(s => s >= 50 && s < 80).length, 
          scores.filter(s => s > 0 && s < 50).length, 
          scores.filter(s => s === 0).length
        ]);
      }
      curW.setDate(curW.getDate() + 7);
    }
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(weekSheet), "Weekly Trends");

  // 6. REPORTS: MONTHLY CONSOLIDATIONS PERIODIC VIEWS
  const monthSheet = [
    ["[MONTHLY HISTORICAL TRENDS]"],
    ["-----------------------------------------------------------------------------------------"],
    ["month", "year", "avg_score", "strong_days_count", "partial_days_count", "weak_days_count", "missed_days_count", "days_tracked"],
    ["-----------------------------------------------------------------------------------------"]
  ];
  const yearSet = [...new Set(allKeys.map(k => k.slice(0, 4)))].sort();
  yearSet.forEach(yr => {
    for (let mi = 0; mi < 12; mi++) {
      const mDays = new Date(+yr, mi + 1, 0).getDate();
      const mKeys = Array.from({length: mDays}, (_, i) => toKey(new Date(+yr, mi, i + 1))).filter(k => k <= todayK && logs[k]);
      if (mKeys.length > 0) {
        const scores = mKeys.map(k => scoreOf(logs[k], k));
        const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
        monthSheet.push([
          months[mi], 
          yr, 
          avg + "%", 
          scores.filter(s => s >= 80).length, 
          scores.filter(s => s >= 50 && s < 80).length, 
          scores.filter(s => s > 0 && s < 50).length, 
          scores.filter(s => s === 0).length, 
          mKeys.length
        ]);
      }
    }
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(monthSheet), "Monthly Trends");

  // 7. REPORTS: INDIVIDUAL PER-TASK ATTAINMENT ANALYSIS DATA
  const perfSheet = [
    ["[INDIVIDUAL TASKS METRICS AND ATTAINMENT PERFORMANCE]"],
    ["-------------------------------------------------------------------------------------------------"],
    ["task_name", "current_lifecycle_status", "date_created", "date_removed", "tracked_active_days", "successful_completions", "attainment_rate_pct"],
    ["-------------------------------------------------------------------------------------------------"]
  ];
  tasks.forEach(t => {
    const activeKeys = allKeys.filter(k => {
      const log = logs[k]; if (!log || !log.__taskIds) return false;
      const hidden = (log.__hiddenIds) || [];
      if (!log.__taskIds.includes(t.id) || hidden.includes(t.id)) return false;
      if (t.deletedAt && k >= t.deletedAt) return false;
      return true;
    });
    const done = activeKeys.filter(k => logs[k][t.id]).length;
    const rate = activeKeys.length > 0 ? Math.round((done / activeKeys.length) * 100) : 0;
    perfSheet.push([
      t.name, 
      t.deletedAt && t.deletedAt <= todayK ? "Removed/Archived" : "Active Dynamic", 
      t.createdAt || "", 
      t.deletedAt || "", 
      activeKeys.length, 
      done, 
      rate + "%"
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(perfSheet), "Tasks Analytics");

  XLSX.writeFile(wb, "tracker-" + todayK + ".xlsx");
  showImportStatus("Exported successfully!", "#4ade80");
}

function parseFlexDate(raw){
  if(!raw)return null;var s=String(raw).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{5}$/.test(s)){var d=new Date(Math.round((+s-25569)*86400*1000));if(!isNaN(d))return toKey(d);}
  var dmy=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if(dmy)return dmy[3]+"-"+dmy[2].padStart(2,"0")+"-"+dmy[1].padStart(2,"0");
  var mdy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(mdy)return mdy[3]+"-"+mdy[1].padStart(2,"0")+"-"+mdy[2].padStart(2,"0");
  var months={jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
  var dmy2=s.match(/^(\d{1,2})[\s\-\/]([a-zA-Z]+)[\s\-\/](\d{4})$/);
  if(dmy2){var m=months[dmy2[2].slice(0,3).toLowerCase()];if(m)return dmy2[3]+"-"+m+"-"+dmy2[1].padStart(2,"0");}
  var nd=new Date(s);if(!isNaN(nd)&&nd.getFullYear()>2000)return toKey(nd);
  return null;
}

function importFromExcel(file){
  if(typeof XLSX==="undefined"){ showImportStatus("SheetJS not loaded. Try again.","#f87171"); return; }
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});

      // Find the data sheet — accept "Manual Import-Export Tracker" or first sheet with date/task_name/status columns
      let targetSheet=null;
      const preferredName="Manual Import-Export Tracker";
      if(wb.Sheets[preferredName]) targetSheet=wb.Sheets[preferredName];
      else {
        // Try to find any sheet containing date/task data
        for(const sname of wb.SheetNames){
          const s=wb.Sheets[sname];
          const rows=XLSX.utils.sheet_to_json(s,{header:1,defval:""});
          // Check if it has at least 3 cols and some row looks like data
          const hasData=rows.some(r=>r.length>=3&&parseFlexDate(String(r[0]).trim())!==null);
          if(hasData){targetSheet=s;break;}
        }
      }
      if(!targetSheet){
        showImportStatus("No valid data sheet found. Make sure your file has date, task_name, status columns.","#f87171");
        return;
      }

      const rawRows=XLSX.utils.sheet_to_json(targetSheet,{header:1,defval:""});

      // Detect column layout — exported format has 4 cols (date,task_id,task_name,status)
      // Simple format has 3 cols (date,task_name,status)
      // Auto-detect by checking header row or first data row
      let colDate=0, colTaskId=-1, colTaskName=1, colStatus=2;
      // Check for header row
      const firstRow=rawRows.find(r=>r&&r.length>=2&&String(r[0]).trim()!=="");
      if(firstRow){
        const h=firstRow.map(c=>String(c).trim().toLowerCase());
        const hi_date=h.findIndex(c=>c==="date");
        const hi_tid=h.findIndex(c=>c==="task_id");
        const hi_tname=h.findIndex(c=>c==="task_name"||c==="name");
        const hi_status=h.findIndex(c=>c==="status"||c==="done"||c==="completion");
        if(hi_date>=0) colDate=hi_date;
        if(hi_tid>=0) colTaskId=hi_tid;
        if(hi_tname>=0) colTaskName=hi_tname;
        if(hi_status>=0) colStatus=hi_status;
      }

      const validRows=[];
      // Build task name→id map for deduplication
      const nameToId={};
      tasks.forEach(t=>{ nameToId[t.name.toLowerCase()]=t.id; });

      rawRows.forEach(row=>{
        if(!row||row.length<2) return;
        const rawDate=String(row[colDate]||"").trim();
        if(!rawDate||rawDate==="date"||rawDate.startsWith("[")||rawDate.startsWith("-")||rawDate==="") return;
        const k=parseFlexDate(rawDate);
        if(!k) return; // skip rows where date can't be parsed

        const rawName=String(row[colTaskName]||"").trim();
        if(!rawName||rawName==="task_name"||rawName==="name") return;

        const rawStatus=String(row[colStatus]||"").trim().toLowerCase();
        // Skip decoration/header rows
        if(rawDate.startsWith("---")||rawName.startsWith("---")) return;

        // Resolve task id — use explicit task_id col if present, else map by name
        let tid="";
        if(colTaskId>=0 && row[colTaskId]) tid=String(row[colTaskId]).trim();
        if(!tid||tid.startsWith("t")<1){
          // Try to find existing task by name (case-insensitive)
          const existing=nameToId[rawName.toLowerCase()];
          if(existing) tid=existing;
          else { tid="t"+Math.abs(rawName.split("").reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0)); }
        }

        const isDone=rawStatus==="done"||rawStatus==="yes"||rawStatus==="true"||rawStatus==="1"||rawStatus==="complete"||rawStatus==="completed";

        validRows.push({date:k, task_id:tid, task_name:rawName, done:isDone});
        // Register in nameToId for future rows
        if(!nameToId[rawName.toLowerCase()]) nameToId[rawName.toLowerCase()]=tid;
      });

      if(validRows.length===0){
        showImportStatus("No valid rows found. Columns needed: date, task_name, status.","#f87171");
        return;
      }

      // Optionally load task definitions from Tasks Definition sheet
      const taskMetaSheet=wb.Sheets["Tasks Definition"];
      if(taskMetaSheet){
        const taskMetaRows=XLSX.utils.sheet_to_json(taskMetaSheet,{header:1,defval:""});
        const extractedTasks=[];
        taskMetaRows.forEach(row=>{
          if(!row||row.length<2) return;
          const id=String(row[0]).trim();
          if(!id||id==="id"||id.startsWith("[")||id.startsWith("-")) return;
          extractedTasks.push({id,name:String(row[1]).trim(),time:String(row[2]||"").trim(),
            createdAt:String(row[3]||"").trim()||undefined,deletedAt:String(row[4]||"").trim()||undefined});
        });
        if(extractedTasks.length>0) tasks=extractedTasks;
      } else {
        // Build tasks list from validRows if no Tasks Definition sheet
        const seenIds={};
        validRows.forEach(r=>{
          if(!seenIds[r.task_id]){
            seenIds[r.task_id]=true;
            const existing=tasks.find(t=>t.id===r.task_id);
            if(!existing) tasks.push({id:r.task_id,name:r.task_name,createdAt:r.date});
          }
        });
      }

      // Rebuild logs — merge with existing so we don't wipe macro data
      const newLogs={};
      // Preserve existing macro and meta data
      Object.keys(logs).forEach(k=>{
        const old=logs[k];
        if(old.__macros||old.__hiddenIds) newLogs[k]=Object.assign({},old,{__taskIds:old.__taskIds||[]});
      });

      validRows.forEach(r=>{
        if(!newLogs[r.date]) newLogs[r.date]={__taskIds:[]};
        newLogs[r.date][r.task_id]=r.done;
        if(!newLogs[r.date].__taskIds.includes(r.task_id)) newLogs[r.date].__taskIds.push(r.task_id);
      });

      logs=newLogs;
      const todayK=getTodayKey();
      const snap=tasks.filter(t=>(!t.createdAt||t.createdAt<=todayK)&&(!t.deletedAt||t.deletedAt>todayK)).map(t=>t.id);
      if(!logs[todayK]) logs[todayK]={__taskIds:snap};
      else if(!logs[todayK].__taskIds) logs[todayK].__taskIds=snap;

      persist();
      showImportStatus("Imported "+validRows.length+" records from "+Object.keys(newLogs).length+" days. Reloading...","#4ade80");
      setTimeout(()=>navigateTo("today"),800);
    }catch(err){
      showImportStatus("Import error: "+err.message,"#f87171");
    }
  };
  reader.onerror=function(){ showImportStatus("Could not read file.","#f87171"); };
  reader.readAsArrayBuffer(file);
}

      const [y,m,d]=ak.split("-").map(Number);

      const nk=toKey(next);
      if(nk>getTodayKey()) return;
      viewingKey=nk>=getTodayKey()?null:nk; editMode=false; editId=null; render(); return;
    }
    if(e.target.id==="edit-toggle"){ editMode=!editMode; editId=null; render(); return; }
    const circ=e.target.closest("[data-toggle]");
    if(circ&&!editMode){
      const ak=viewingKey||getTodayKey();
      const id=circ.dataset.toggle;
      const day=logs[ak]||{};
      const updated=Object.assign({},day,{[id]:!day[id]});
      if(!updated.__taskIds) updated.__taskIds=tasks.filter(t=>(!t.createdAt||t.createdAt<=ak)&&(!t.deletedAt||t.deletedAt>ak)).map(t=>t.id);
      logs[ak]=updated; persist(); render(); return;
    }
    const editBtn=e.target.closest("[data-edit]");
    if(editBtn&&editMode){ editId=editBtn.dataset.edit; render(); return; }
    if(e.target.id==="save-edit-btn"){
      const name=document.getElementById("edit-name-inp").value.trim();
      const time=document.getElementById("edit-time-inp").value.trim();
      if(!name) return;
      tasks=tasks.map(t=>t.id===editId?Object.assign({},t,{name,time}):t);
      editId=null; persist(); render(); return;
    }
    const delBtn=e.target.closest("[data-del]");
    if(delBtn&&editMode){
      const ak=viewingKey||getTodayKey();
      const isLive=ak===getTodayKey();
      const delId=delBtn.dataset.del;
      if(isLive){
        tasks=tasks.map(t=>t.id===delId?Object.assign({},t,{deletedAt:ak}):t);
        Object.keys(logs).forEach(k=>{
          if(k>=ak&&logs[k]&&logs[k].__taskIds)
            logs[k].__taskIds=logs[k].__taskIds.filter(id=>id!==delId);
        });
      } else {
        const day=logs[ak]||{};
        const hidden=[...(day.__hiddenIds||[])];
        if(!hidden.includes(delId)) hidden.push(delId);
        const snap=[...(day.__taskIds||tasks.map(t=>t.id))].filter(id=>id!==delId);
        logs[ak]=Object.assign({},day,{__hiddenIds:hidden,__taskIds:snap});
      }
      persist(); render(); return;
    }
    const upBtn=e.target.closest("[data-up]");
    if(upBtn&&editMode){
      const i=tasks.findIndex(t=>t.id===upBtn.dataset.up);
      if(i>0){[tasks[i],tasks[i-1]]=[tasks[i-1],tasks[i]]; tasks=[...tasks]; persist(); render();} return;
    }
    const dnBtn=e.target.closest("[data-dn]");
    if(dnBtn&&editMode){
      const i=tasks.findIndex(t=>t.id===dnBtn.dataset.dn);
      if(i<tasks.length-1){[tasks[i],tasks[i+1]]=[tasks[i+1],tasks[i]]; tasks=[...tasks]; persist(); render();} return;
    }
    if(e.target.id==="add-task-btn"){
      const ak=viewingKey||getTodayKey();
      const name=document.getElementById("new-name").value.trim();
      const time=document.getElementById("new-time").value.trim();
      if(!name) return;
      const newTask={id:"t"+Date.now(),name,time,createdAt:ak};
      tasks.push(newTask);
      const newId=newTask.id;
      Object.keys(logs).forEach(k=>{
        if(k>=ak&&logs[k]&&logs[k].__taskIds&&!logs[k].__taskIds.includes(newId))
          logs[k].__taskIds=[...logs[k].__taskIds,newId];
      });
      const _al=logs[ak]||{};
      if(!_al.__taskIds){
        const snap=tasks.filter(t=>(!t.createdAt||t.createdAt<=ak)&&(!t.deletedAt||t.deletedAt>k)).map(t=>t.id);
        logs[ak]=Object.assign({},_al,{__taskIds:snap});
      } else if(!logs[ak].__taskIds.includes(newId)){
        logs[ak].__taskIds=[...logs[ak].__taskIds,newId];
      }
      persist(); render(); return;
    }
  });
}

      inp.onkeydown=function(e){if(e.key==="Enter")btn.onclick();};
      inp.focus();
    }else{hideSplash();}
  }
  document.getElementById("splash-btn").addEventListener("click",dismiss);
  if(userName)setTimeout(dismiss,2000);
})();

document.getElementById("jump-today-btn").addEventListener("click",function(){viewingKey=null;editMode=false;editId=null;render();});

document.addEventListener("change",function(e){
  if(e.target.id==="import-excel-input"){var file=e.target.files[0];if(!file)return;showImportStatus("Reading file...","#fbbf24");importFromExcel(file);e.target.value="";}
});

document.addEventListener("click",function(e){

  if(e.target && e.target.id==="download-template-btn"){
    try{
      if(typeof XLSX==="undefined") return;

      const wb = XLSX.utils.book_new();

      const wsData = [
        ["date","task_name","status"],
        ["2026-01-01","Workout","Done"],
        ["2026-01-01","Reading","Undone"]
      ];

      const ws = XLSX.utils.aoa_to_sheet(wsData);

      XLSX.utils.book_append_sheet(wb, ws, "Template");

      XLSX.writeFile(wb, "tracker-template.xlsx");

    }catch(err){
      console.error(err);
    }
  }

});

</script>
</body>
</html>
